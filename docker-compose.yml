version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: streamkita-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: streamkita
      POSTGRES_PASSWORD: streamkita123
      POSTGRES_DB: streamkita_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamkita -d streamkita_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

# Nginx RTMP Streaming Server
  nginx-rtmp:
    build:
      context: ./rtmp
      dockerfile: Dockerfile
    container_name: nginx-rtmp
    ports:
      - "1935:1935"   # RTMP port
      - "8080:80"     # HLS HTTP port
    volumes:
      - ./rtmp/hls:/usr/local/nginx/html/hls
      - ./rtmp/data:/usr/local/nginx/html/data
    environment:
      - NGINX_PORT=80
    restart: unless-stopped
    networks:
      - live-streaming

  # Live Chat Server
  live-chat:
    build:
      context: ./rtmp/chat
      dockerfile: Dockerfile
    container_name: live-chat
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - PORT=3007
      - CORS_ORIGIN=http://deluwang.online,http://live.deluwang.online
    restart: unless-stopped
    networks:
      - live-streaming

volumes:
  postgres_data:
    driver: local

networks:
  live-streaming:
    driver: bridge