<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Streaming - Deluwang</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .livestream-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .video-player {
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            position: relative;
        }

        #video-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .offline-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
        }

        .live-indicator {
            background: #ff4444;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            display: none;
            margin-bottom: 10px;
        }

        .live-indicator.active {
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .stream-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .viewer-count {
            font-weight: bold;
            color: #666;
        }

        .chat-container {
            border: 1px solid #ddd;
            border-radius: 8px;
            height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #fafafa;
        }

        .chat-message {
            margin-bottom: 10px;
            padding: 8px;
            background: white;
            border-radius: 4px;
            border-left: 3px solid #007bff;
        }

        .chat-username {
            font-weight: bold;
            color: #007bff;
            margin-right: 8px;
        }

        .chat-timestamp {
            font-size: 11px;
            color: #999;
            margin-left: 8px;
        }

        .chat-input-container {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
            border-radius: 0 0 8px 8px;
        }

        .chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-right: 10px;
        }

        .chat-send-btn {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .chat-send-btn:hover {
            background: #0056b3;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        @media (max-width: 768px) {
            .livestream-container {
                padding: 10px;
            }

            .chat-container {
                height: 300px;
            }

            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="livestream-container">
        <h1>🔴 Live Streaming Deluwang</h1>

        <!-- Stream Info -->
        <div class="stream-info">
            <div class="live-indicator" id="liveIndicator">● LIVE</div>
            <div>Status: <span id="streamStatus">Offline</span></div>
            <div class="viewer-count">👥 Viewers: <span id="viewerCount">0</span></div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn btn-primary" onclick="startStream()">▶️ Start Stream</button>
            <button class="btn btn-secondary" onclick="stopStream()">⏹️ Stop Stream</button>
            <button class="btn btn-secondary" onclick="toggleFullscreen()">🔳 Fullscreen</button>
        </div>

        <!-- Video Player -->
        <div class="video-wrapper">
            <div class="video-player">
                <video id="video-player" controls muted autoplay></video>
                <div class="offline-overlay" id="offlineOverlay">
                    <h2>🔴 Stream is Offline</h2>
                    <p>Tunggu streaming dimulai atau coba lagi nanti</p>
                </div>
            </div>
        </div>

        <!-- Chat Container -->
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="chat-message">
                    <span class="chat-username">System:</span>
                    <span>Selamat datang di live streaming Deluwang! Chat akan muncul di sini.</span>
                </div>
            </div>
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="Tulis pesan..." maxlength="200">
                <button class="chat-send-btn" onclick="sendMessage()">Kirim</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            // Stream key untuk default stream
            DEFAULT_STREAM_KEY: 'deluwang-live',
            // HLS endpoint
            HLS_URL: (streamKey) => `http://live.deluwang.online/hls/${streamKey}.m3u8`,
            // Chat server endpoint
            CHAT_SERVER: 'http://live.deluwang.online:3007',
            // Auto reconnect interval (ms)
            RECONNECT_INTERVAL: 5000
        };

        // Global variables
        let socket = null;
        let hlsPlayer = null;
        let currentStreamKey = CONFIG.DEFAULT_STREAM_KEY;
        let isConnected = false;
        let reconnectTimer = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeChat();
            setupEventListeners();
            checkStreamStatus();
        });

        // Initialize chat connection
        function initializeChat() {
            try {
                socket = io(CONFIG.CHAT_SERVER);

                socket.on('connect', () => {
                    console.log('Connected to chat server');
                    isConnected = true;
                    socket.emit('userInfo', { username: getUsername() });
                });

                socket.on('disconnect', () => {
                    console.log('Disconnected from chat server');
                    isConnected = false;
                });

                socket.on('previousMessages', (messages) => {
                    const chatMessages = document.getElementById('chatMessages');
                    // Clear existing messages except system message
                    chatMessages.innerHTML = `
                        <div class="chat-message">
                            <span class="chat-username">System:</span>
                            <span>Selamat datang di live streaming Deluwang!</span>
                        </div>
                    `;

                    messages.forEach(msg => {
                        addChatMessage(msg);
                    });
                });

                socket.on('newMessage', (message) => {
                    addChatMessage(message);
                });

                socket.on('streamStatus', (status) => {
                    updateStreamStatus(status);
                });

                socket.on('userCount', (count) => {
                    document.getElementById('viewerCount').textContent = count;
                });

                socket.on('rateLimited', (message) => {
                    alert('Rate limit: ' + message);
                });

            } catch (error) {
                console.error('Failed to connect to chat server:', error);
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            const chatInput = document.getElementById('chatInput');
            chatInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            // Auto reconnect on page visibility change
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden && !isConnected) {
                    initializeChat();
                }
            });
        }

        // Get username from localStorage or generate random
        function getUsername() {
            let username = localStorage.getItem('deluwang_username');
            if (!username) {
                username = 'User_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('deluwang_username', username);
            }
            return username;
        }

        // Start streaming
        function startStream() {
            currentStreamKey = prompt('Masukkan Stream Key:', CONFIG.DEFAULT_STREAM_KEY);
            if (currentStreamKey) {
                loadStream(currentStreamKey);
            }
        }

        // Load and play stream
        function loadStream(streamKey) {
            const video = document.getElementById('video-player');
            const hlsUrl = CONFIG.HLS_URL(streamKey);

            console.log('Loading stream:', hlsUrl);

            if (Hls.isSupported()) {
                if (hlsPlayer) {
                    hlsPlayer.destroy();
                }

                hlsPlayer = new Hls({
                    debug: false,
                    enableWorker: true,
                    lowLatencyMode: true,
                    backBufferLength: 90
                });

                hlsPlayer.loadSource(hlsUrl);
                hlsPlayer.attachMedia(video);

                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    console.log('Stream loaded, playing...');
                    video.play().catch(e => {
                        console.error('Autoplay failed:', e);
                    });
                    hideOfflineOverlay();
                });

                hlsPlayer.on(Hls.Events.ERROR, function(event, data) {
                    console.error('HLS Error:', data);
                    if (data.fatal) {
                        showOfflineOverlay();
                        scheduleReconnect();
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Native HLS support (Safari)
                video.src = hlsUrl;
                video.addEventListener('loadedmetadata', function() {
                    video.play().catch(e => {
                        console.error('Autoplay failed:', e);
                    });
                    hideOfflineOverlay();
                });
                video.addEventListener('error', function() {
                    showOfflineOverlay();
                    scheduleReconnect();
                });
            } else {
                alert('Browser Anda tidak mendukung streaming. Silakan gunakan Chrome, Firefox, atau Safari.');
            }
        }

        // Stop streaming
        function stopStream() {
            if (hlsPlayer) {
                hlsPlayer.stopLoad();
                hlsPlayer.destroy();
                hlsPlayer = null;
            }

            const video = document.getElementById('video-player');
            video.pause();
            video.src = '';

            showOfflineOverlay();
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            const videoWrapper = document.querySelector('.video-wrapper');
            if (!document.fullscreenElement) {
                videoWrapper.requestFullscreen().catch(err => {
                    console.error('Fullscreen failed:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Send chat message
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (message && socket && isConnected) {
                socket.emit('sendMessage', {
                    username: getUsername(),
                    message: message
                });
                input.value = '';
            } else if (!isConnected) {
                alert('Tidak terhubung ke server chat. Silakan refresh halaman.');
            }
        }

        // Add chat message to UI
        function addChatMessage(message) {
            const chatMessages = document.getElementById('chatMessages');
            const messageElement = document.createElement('div');
            messageElement.className = 'chat-message';

            const timestamp = new Date(message.timestamp).toLocaleTimeString('id-ID', {
                hour: '2-digit',
                minute: '2-digit'
            });

            messageElement.innerHTML = `
                <span class="chat-username">${escapeHtml(message.username)}:</span>
                <span>${escapeHtml(message.message)}</span>
                <span class="chat-timestamp">${timestamp}</span>
            `;

            chatMessages.appendChild(messageElement);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Update stream status
        function updateStreamStatus(status) {
            const statusElement = document.getElementById('streamStatus');
            const liveIndicator = document.getElementById('liveIndicator');

            if (status.isLive) {
                statusElement.textContent = 'Live';
                statusElement.style.color = '#ff4444';
                liveIndicator.classList.add('active');

                // Auto-load stream if not already loaded
                if (!hlsPlayer) {
                    loadStream(status.streamKey || CONFIG.DEFAULT_STREAM_KEY);
                }
            } else {
                statusElement.textContent = 'Offline';
                statusElement.style.color = '#666';
                liveIndicator.classList.remove('active');
                showOfflineOverlay();
            }
        }

        // Check stream status from server
        function checkStreamStatus() {
            fetch(`${CONFIG.CHAT_SERVER}/stream-status`)
                .then(response => response.json())
                .then(status => {
                    updateStreamStatus(status);
                })
                .catch(error => {
                    console.error('Failed to check stream status:', error);
                });
        }

        // Show/hide offline overlay
        function showOfflineOverlay() {
            document.getElementById('offlineOverlay').style.display = 'flex';
            document.getElementById('streamStatus').textContent = 'Offline';
        }

        function hideOfflineOverlay() {
            document.getElementById('offlineOverlay').style.display = 'none';
            document.getElementById('streamStatus').textContent = 'Live';
        }

        // Schedule reconnection attempt
        function scheduleReconnect() {
            if (reconnectTimer) return;

            reconnectTimer = setTimeout(() => {
                console.log('Attempting to reconnect...');
                loadStream(currentStreamKey);
                reconnectTimer = null;
            }, CONFIG.RECONNECT_INTERVAL);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
