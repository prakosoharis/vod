# Live streaming configuration for live.deluwang.online
server {
    listen 80;
    server_name live.deluwang.online;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS headers
    add_header 'Access-Control-Allow-Origin' 'http://deluwang.online' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Range, Authorization' always;

    # Proxy HLS streams from Docker container
    location /hls/ {
        proxy_pass http://localhost:8080/hls/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache settings for HLS
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";

        # HLS specific
        location ~ \.m3u8$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location ~ \.ts$ {
            expires 1s;
        }
    }

    # Proxy RTMP statistics
    location /stat {
        proxy_pass http://localhost:8080/stat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://localhost:8080/health;
        access_log off;
    }

    # API endpoints for chat integration
    location /api/chat/ {
        proxy_pass http://localhost:3007/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # WebSocket endpoint for Socket.IO
    location /socket.io/ {
        proxy_pass http://localhost:3007/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root endpoint
    location / {
        return 200 'Deluwang Live Streaming Server\nRTMP: rtmp://live.deluwang.online/live/[STREAM_KEY]\nHLS: http://live.deluwang.online/hls/[STREAM_KEY].m3u8\n';
        add_header Content-Type text/plain;
    }

    # Log files
    access_log /var/log/nginx/live.deluwang.online.access.log;
    error_log /var/log/nginx/live.deluwang.online.error.log;
}

# Additional config for Socket.IO WebSocket
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}