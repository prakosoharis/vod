worker_processes auto;
events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            # HLS Configuration - Optimized for Low Latency
            hls on;
            hls_path /usr/local/nginx/html/hls;
            hls_fragment 1s;           # Reduced from 3s to 1s for faster segments
            hls_playlist_length 6s;    # Reduced from 60s to 6s (6 segments × 1s)
            hls_continuous on;
            hls_cleanup on;
            hls_nested on;
            hls_fragment_naming system; # Better segment naming for LL-HLS
            hls_variant _720p BANDWIDTH=1000000,RESOLUTION=1280x720;

            # Allow publishing from any IP
            allow publish all;
            allow play all;

            # Disable idle streams
            idle_streams off;

            # RTMP Statistics
            notify_method get;
        }

        application vod {
            play /usr/local/nginx/html/data;
        }
    }
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Log format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;
    error_log /dev/stderr;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name _;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Range, Authorization, Content-Type' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        # Serve HLS files
        location /hls/ {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /usr/local/nginx/html;

            # CORS headers for HLS
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range, Authorization, Content-Type' always;

            # Cache control
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";

            # Prevent hotlinking - disabled for testing
            # valid_referers none blocked server_names;
            # if ($invalid_referer) {
            #     return 403;
            # }
        }

        # VOD files location
        location /vod/ {
            types {
                video/mp4 mp4;
                video/webm webm;
                video/ogg ogg;
            }
            root /usr/local/nginx/html;
        }

        # Root endpoint
        location / {
            return 200 'Nginx RTMP Server - Live Streaming Active\n';
            add_header Content-Type text/plain;
        }

        # Statistics page
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/src/nginx-rtmp-module-master;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}