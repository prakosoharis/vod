version: '3.8'

# ================================================================
# HLS TRANSCODER - LOCAL DEVELOPMENT CONFIGURATION
# ================================================================
# Usage: docker-compose -f docker-compose.local.yml up -d
#
# Features:
# - All ports exposed for easy access (localhost:8089, etc)
# - Development-friendly environment
# - Hot reload enabled for backend
# - Easier debugging and testing
# ================================================================

services:
  # MinIO - S3 Compatible Storage (Simulating AWS S3 + Wasabi)
  minio:
    image: minio/minio:latest
    container_name: hls-minio-dev
    ports:
      - "9000:9000"  # API - Accessible on localhost:9000
      - "9001:9001"  # Console - Accessible on localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_dev:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - hls-network-dev

  # Backend - Node.js + FFmpeg Transcoder
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hls-backend-dev
    ports:
      - "5000:5000"  # Direct access for debugging
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-5000}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-password123}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - TEMP_BUCKET=${TEMP_BUCKET:-temp-raw-aws}
      - PERM_BUCKET=${PERM_BUCKET:-perm-storage-wasabi}
      - CDN_BASE_URL=${CDN_BASE_URL:-http://localhost:8089}
    volumes:
      - ./backend/uploads:/app/uploads  # Persistent temp folder
      - ./backend/src:/app/src  # Hot reload for development (if applicable)
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - hls-network-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx - CDN Simulator (Reverse Proxy to MinIO)
  nginx:
    image: nginx:alpine
    container_name: hls-nginx-dev
    ports:
      - "8089:80"  # Main entry point
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend-test:/usr/share/nginx/html:ro
    depends_on:
      - minio
      - backend
    networks:
      - hls-network-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hls-network-dev:
    driver: bridge
    name: hls-network-dev

volumes:
  minio_data_dev:
    driver: local
    name: hls-minio-data-dev
