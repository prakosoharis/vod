version: '3.8'

services:
  # MinIO - S3 Compatible Storage (Simulating AWS S3 + Wasabi)
  minio:
    image: minio/minio:latest
    container_name: hls-minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - hls-network

  # Backend - Node.js + FFmpeg Transcoder
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hls-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
      - MINIO_USE_SSL=false
      - TEMP_BUCKET=temp-raw-aws
      - PERM_BUCKET=perm-storage-wasabi
    volumes:
      - ./backend/uploads:/app/uploads  # Persistent temp folder
    depends_on:
      - minio
    networks:
      - hls-network
    restart: unless-stopped

  # Nginx - CDN Simulator (Reverse Proxy to MinIO)
  nginx:
    image: nginx:alpine
    container_name: hls-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend-test:/usr/share/nginx/html:ro
    depends_on:
      - minio
      - backend
    networks:
      - hls-network
    restart: unless-stopped

networks:
  hls-network:
    driver: bridge

volumes:
  minio_data:
    driver: local
