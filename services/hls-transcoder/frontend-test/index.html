<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Transcoder - Upload & Transcode</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 968px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px 20px;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .upload-area:hover {
            background: #eef1ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e0e7ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .upload-area h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .upload-area p {
            color: #666;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        .selected-file {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            display: none;
            text-align: left;
        }

        .selected-file.show {
            display: block;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            width: 100%;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(118, 75, 162, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .progress-container {
            display: none;
            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .status-message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
        }

        .status-message.info {
            background: #e0e7ff;
            color: #667eea;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 4px solid;
        }

        .history-item.success {
            background: #d4edda;
            border-color: #28a745;
        }

        .history-item.failed {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .history-item h4 {
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .history-item p {
            font-size: 0.85rem;
            color: #666;
            margin: 3px 0;
        }

        .history-item .url {
            font-family: monospace;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.05);
            padding: 5px;
            border-radius: 5px;
            margin-top: 5px;
            word-break: break-all;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 3px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-left: 5px;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 8px;
        }

        .badge.success {
            background: #28a745;
            color: white;
        }

        .badge.failed {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎬 HLS Video Transcoder</h1>
            <p>Upload & Transcode dengan Tracking Real-time</p>
        </div>

        <div class="grid">
            <!-- Upload Section -->
            <div class="card">
                <h2>📤 Upload Video</h2>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📹</div>
                    <h3>Pilih Video</h3>
                    <p>Drag & drop atau klik untuk browse</p>
                    <p style="color: #999; margin-top: 5px; font-size: 0.85rem;">
                        Format: MP4, MOV, AVI, MKV, WebM, FLV, WMV
                    </p>
                    <input type="file" id="fileInput" accept="video/*">
                </div>

                <div class="selected-file" id="selectedFile">
                    <strong>File:</strong> <span id="fileName"></span><br>
                    <strong>Size:</strong> <span id="fileSize"></span>
                </div>

                <button class="btn" id="uploadBtn" style="display: none;">
                    📤 Upload Video
                </button>

                <button class="btn btn-success" id="transcodeBtn" style="display: none;">
                    🎬 Mulai Transcode
                </button>

                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill">0%</div>
                    </div>
                    <div class="status-message info" id="statusMessage">
                        Siap...
                    </div>
                </div>
            </div>

            <!-- History Section -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="margin: 0;">📋 History (Sukses & Gagal)</h2>
                    <button class="btn" id="clearHistoryBtn" style="width: auto; padding: 8px 20px; margin: 0; font-size: 0.9rem; background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);">
                        🗑️ Clear History
                    </button>
                </div>
                <div class="history-list" id="historyList">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>Belum ada history</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const selectedFile = document.getElementById('selectedFile');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const transcodeBtn = document.getElementById('transcodeBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const statusMessage = document.getElementById('statusMessage');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        let selectedVideoFile = null;
        let uploadedFile = null;
        let history = JSON.parse(localStorage.getItem('transcodeHistory') || '[]');
        let statusPollingInterval = null;

        // Load history on page load
        renderHistory();

        // Clear History button
        clearHistoryBtn.addEventListener('click', () => {
            if (confirm('Apakah Anda yakin ingin menghapus semua history?')) {
                history = [];
                localStorage.removeItem('transcodeHistory');
                renderHistory();
                alert('History berhasil dihapus!');
            }
        });

        // Drag & Drop handlers
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
                handleFileSelect(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFileSelect(file);
            }
        });

        function handleFileSelect(file) {
            selectedVideoFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            selectedFile.classList.add('show');
            uploadBtn.style.display = 'block';
            transcodeBtn.style.display = 'none';
            uploadedFile = null;
        }

        // Upload Video
        uploadBtn.addEventListener('click', async () => {
            if (!selectedVideoFile) return;

            uploadBtn.disabled = true;
            progressContainer.style.display = 'block';

            const formData = new FormData();
            formData.append('video', selectedVideoFile);

            try {
                updateProgress(5, '📤 Memulai upload...', 'info');

                const xhr = new XMLHttpRequest();

                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        updateProgress(percent, `📤 Uploading... ${percent}%`, 'info');
                    }
                });

                xhr.addEventListener('load', () => {
                    console.log('[UPLOAD] XHR load - Status:', xhr.status, 'Response type:', xhr.getResponseHeader('Content-Type'));
                    console.log('[UPLOAD] Response (first 500 chars):', xhr.responseText.substring(0, 500));

                    if (xhr.status === 200 || xhr.status === 202) {
                        try {
                            const response = JSON.parse(xhr.responseText);
                            handleUploadSuccess(response);
                        } catch (parseError) {
                            console.error('[UPLOAD] JSON parse error:', parseError);
                            console.error('[UPLOAD] Full response:', xhr.responseText);
                            handleError('Upload', 'Server returned invalid response: ' + xhr.responseText.substring(0, 200), selectedVideoFile.name);
                        }
                    } else {
                        try {
                            const error = JSON.parse(xhr.responseText);
                            handleError('Upload', error.message || error.error || 'Upload gagal', selectedVideoFile.name);
                        } catch (e) {
                            handleError('Upload', `Server error (${xhr.status}): ` + xhr.responseText.substring(0, 200), selectedVideoFile.name);
                        }
                    }
                });

                xhr.addEventListener('error', () => {
                    handleError('Upload', 'Network error', selectedVideoFile.name);
                });

                xhr.open('POST', '/api/upload');
                xhr.send(formData);

            } catch (error) {
                handleError('Upload', error.message, selectedVideoFile.name);
            }
        });

        function handleUploadSuccess(response) {
            updateProgress(100, '✅ Upload selesai! Memulai transcode...', 'success');
            uploadedFile = response.data;

            uploadBtn.style.display = 'none';
            transcodeBtn.style.display = 'none';

            // Start polling status
            const videoId = response.data.videoId;
            startPollingStatus(videoId);
        }

        // Poll status endpoint for progress updates
        function startPollingStatus(videoId) {
            // Clear any existing polling
            if (statusPollingInterval) {
                clearInterval(statusPollingInterval);
            }

            // Poll every 2 seconds
            statusPollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/status/${videoId}`);
                    const data = await response.json();

                    if (!data.success) {
                        throw new Error('Status check failed');
                    }

                    const status = data.data;
                    updateProgressFromStatus(status);

                    // Stop polling when completed or failed
                    if (status.status === 'completed') {
                        clearInterval(statusPollingInterval);
                        handleTranscodeComplete(status);
                    } else if (status.status === 'failed') {
                        clearInterval(statusPollingInterval);
                        handleError('Transcode', status.error || 'Unknown error', selectedVideoFile.name);
                    }

                } catch (error) {
                    console.error('Polling error:', error);
                    // Don't stop polling on network errors, just log them
                }
            }, 2000);
        }

        // Update progress based on status
        function updateProgressFromStatus(status) {
            const statusMap = {
                'uploading': { msg: '📤 Uploading ke storage...', type: 'info' },
                'uploaded': { msg: '✅ Upload selesai, memulai transcode...', type: 'success' },
                'downloading': { msg: '⬇️ Downloading video...', type: 'info' },
                'transcoding': { msg: '🎬 Transcoding ke HLS format...', type: 'info' },
                'uploading_hls': { msg: '⬆️ Uploading HLS files...', type: 'info' },
                'cleanup': { msg: '🧹 Cleaning up...', type: 'info' },
                'completed': { msg: '✅ Transcode selesai!', type: 'success' }
            };

            const statusInfo = statusMap[status.status] || { msg: status.status, type: 'info' };
            const progress = status.progress || 0;

            updateProgress(progress, `${statusInfo.msg} (${progress}%)`, statusInfo.type);
        }

        // Handle transcode completion
        function handleTranscodeComplete(status) {
            updateProgress(100, '✅ Video sudah tersedia untuk streaming!', 'success');

            addHistory({
                fileName: selectedVideoFile.name,
                status: 'success',
                stage: 'Transcode Selesai',
                videoId: status.videoId,
                hlsUrl: status.hlsUrl,
                cdnUrl: status.cdnUrl,
                timestamp: new Date().toLocaleString('id-ID')
            });

            // Reset form after 3 seconds
            setTimeout(() => {
                resetForm();
            }, 3000);
        }

        function handleError(stage, message, fileName) {
            // Stop polling if active
            if (statusPollingInterval) {
                clearInterval(statusPollingInterval);
                statusPollingInterval = null;
            }

            updateProgress(0, `❌ ${stage} Gagal: ${message}`, 'error');
            uploadBtn.disabled = false;
            transcodeBtn.disabled = false;

            addHistory({
                fileName: fileName || 'Unknown',
                status: 'failed',
                stage: stage,
                error: message,
                timestamp: new Date().toLocaleString('id-ID')
            });
        }

        function updateProgress(percent, message, type) {
            progressFill.style.width = percent + '%';
            progressFill.textContent = percent + '%';
            statusMessage.textContent = message;
            statusMessage.className = 'status-message ' + type;
        }

        function resetForm() {
            // Stop polling if active
            if (statusPollingInterval) {
                clearInterval(statusPollingInterval);
                statusPollingInterval = null;
            }

            progressContainer.style.display = 'none';
            selectedFile.classList.remove('show');
            uploadBtn.style.display = 'none';
            transcodeBtn.style.display = 'none';
            selectedVideoFile = null;
            uploadedFile = null;
            fileInput.value = '';
            updateProgress(0, 'Siap...', 'info');
        }

        function addHistory(item) {
            history.unshift(item);
            if (history.length > 20) history.pop(); // Keep last 20
            localStorage.setItem('transcodeHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>Belum ada history</p>
                    </div>
                `;
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="history-item ${item.status}">
                    <h4>
                        ${item.status === 'success' ? '✅' : '❌'} ${item.fileName}
                        <span class="badge ${item.status}">${item.status === 'success' ? 'SUKSES' : 'GAGAL'}</span>
                    </h4>
                    <p><strong>Stage:</strong> ${item.stage}</p>
                    <p><strong>Waktu:</strong> ${item.timestamp}</p>
                    ${item.videoId ? `<p><strong>Video ID:</strong> ${item.videoId}</p>` : ''}
                    ${item.error ? `<p><strong>Error:</strong> ${item.error}</p>` : ''}
                    ${item.hlsUrl ? `
                        <div class="url">
                            <strong>HLS URL:</strong><br>
                            <span id="url-${item.videoId}">${item.hlsUrl}</span>
                            <button class="copy-btn" onclick="copyText('url-${item.videoId}')">Copy</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied!');
            });
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
    </script>
</body>
</html>
